<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ASM - AI BY ANDRI</title>
  <meta name="theme-color" content="#FFA500">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <aside class="sidebar" id="sidebar">
    <div class="side-top">
      <div class="side-brand">
        <img src="https://via.placeholder.com/32" class="side-logo-img" alt="ASM - AI" draggable="false">
        <div class="side-title">ASM - AI</div>
      </div>
      <button class="side-close" id="sideClose" type="button" aria-label="Tutup sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="side-actions">
      <button class="side-btn" id="newChatBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <span>Obrolan Baru</span>
      </button>
    </div>

    <div class="side-history" id="sideHistory"></div>

    <div class="side-user-row" id="sideUserRow">
      <div class="side-user-avatar" id="sideUserAvatar">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="20" height="20">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
        </svg>
      </div>
      <span class="side-user-name" id="sideUserName">Pengguna</span>
      <button class="side-user-dots" id="sideUserDots" type="button">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
          <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
        </svg>
      </button>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="header">
      <div class="header-left">
        <div class="menu-btn" id="menuBtn">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="header-chat-info" id="headerChatInfo" style="display:none;">
        <div class="header-chat-title" id="headerChatTitle">Obrolan Baru</div>
      </div>
      <div class="header-right-actions">
        <button class="new-chat-btn" id="newChatTopBtn" type="button">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" width="18" height="18">
            <circle cx="12" cy="12" r="9"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <section class="welcome-section" id="hero">
        <div class="logo-container">
          <div class="logo" style="display:flex;align-items:center;justify-content:center;font-size:3rem;">⚡</div>
          <span class="welcome-text" id="welcomeGreeting">ASM - AI, Tanya Aja.</span>
        </div>
      </section>

      <section class="messages-container" id="chatArea" style="display:none;">
        <div class="messages-inner" id="chatWrap"></div>
      </section>
    </main>

    <div class="chat-container">
      <div class="chat-input-wrapper">
        <div class="input-row">
          <textarea class="chat-input" id="chatInput" placeholder="Ada Yang Saya Bisa Bantu? " rows="1"></textarea>
          <div class="right-actions">
            <button class="send-btn" id="actionBtn" type="button" aria-label="Kirim">
              <svg class="send-icon" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" width="20" height="20">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span id="toastText"></span>
    <button class="toast-close" id="toastClose">✕</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const menuBtn = document.getElementById('menuBtn');
      const sideClose = document.getElementById('sideClose');
      const sidebar = document.getElementById('sidebar');
      const sidebarBackdrop = document.getElementById('sidebarBackdrop');

      const toggleSidebar = () => {
        sidebar.classList.toggle('open');
        sidebarBackdrop.classList.toggle('active');
      };

      menuBtn.addEventListener('click', toggleSidebar);
      sideClose.addEventListener('click', toggleSidebar);
      sidebarBackdrop.addEventListener('click', toggleSidebar);

      const sendBtn = document.getElementById('actionBtn');
      const chatInput = document.getElementById('chatInput');
      const heroSection = document.getElementById('hero');
      const chatArea = document.getElementById('chatArea');
      const chatWrap = document.getElementById('chatWrap');
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      const headerChatInfo = document.getElementById('headerChatInfo');
      const headerChatTitle = document.getElementById('headerChatTitle');
      const newChatBtn = document.getElementById('newChatBtn');
      const newChatTopBtn = document.getElementById('newChatTopBtn');
      const sideUserDots = document.getElementById('sideUserDots');

      let currentSessionId = null;
      let isSending = false;

      function showToast(message) {
        toastText.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
          toast.classList.remove('show');
        }, 3000);
      }

      document.getElementById('toastClose').addEventListener('click', () => {
        toast.classList.remove('show');
      });

      function newChat() {
        heroSection.style.display = 'flex';
        chatArea.style.display = 'none';
        chatWrap.innerHTML = '';
        currentSessionId = null;
        headerChatInfo.style.display = 'none';
        headerChatTitle.textContent = 'Obrolan Baru';
        chatInput.value = '';
        chatInput.style.height = 'auto';
        sidebar.classList.remove('open');
        sidebarBackdrop.classList.remove('active');
      }

      newChatBtn.addEventListener('click', newChat);
      newChatTopBtn.addEventListener('click', newChat);

      sideUserDots.addEventListener('click', () => {
        showToast('Fitur akun segera hadir');
      });

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function scrollToBottom() {
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }

      function autoResize() {
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 150) + 'px';
      }

      chatInput.addEventListener('input', autoResize);

      function cleanThinkingTags(str) {
        return str.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
      }

      function formatAiText(str) {
        let cleaned = cleanThinkingTags(str);
        let escaped = escapeHtml(cleaned);
        return escaped.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      }

      async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || isSending) return;

        isSending = true;
        sendBtn.disabled = true;

        heroSection.style.display = 'none';
        chatArea.style.display = 'block';

        const userBubble = document.createElement('div');
        userBubble.className = 'chat-bubble user';
        userBubble.textContent = text;
        chatWrap.appendChild(userBubble);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        scrollToBottom();

        headerChatInfo.style.display = 'flex';
        const shortTitle = text.length > 35 ? text.substring(0, 35) + '...' : text;
        headerChatTitle.textContent = shortTitle;

        const aiBubble = document.createElement('div');
        aiBubble.className = 'chat-bubble ai';

        const loadingDots = document.createElement('span');
        loadingDots.className = 'loading-dots';
        loadingDots.innerHTML = '<span>.</span><span>.</span><span>.</span>';
        aiBubble.appendChild(loadingDots);
        chatWrap.appendChild(aiBubble);
        scrollToBottom();

        try {
          const response = await fetch('/api/chat/gpt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: text,
              sessionId: currentSessionId
            })
          });

          const data = await response.json();

          if (data.success) {
            let aiText = data.text || '';
            let formatted = formatAiText(aiText);

            if (formatted) {
              aiBubble.innerHTML = formatted;
            } else {
              aiBubble.textContent = 'Tidak ada respons.';
            }
            if (data.sessionId) currentSessionId = data.sessionId;
          } else {
            aiBubble.textContent = 'Error: ' + (data.error || 'Terjadi kesalahan');
          }
        } catch (err) {
          aiBubble.textContent = 'Gagal terhubung ke server, mungkin lagi maintenance.';
        }

        isSending = false;
        sendBtn.disabled = false;
        scrollToBottom();
      }

      sendBtn.addEventListener('click', sendMessage);

      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    });
  </script>
</body>
</html>
